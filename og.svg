<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1a1a2e"/>
  <!-- subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- gold accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#c9a84c"/>
  <!-- S mark -->
  <text x="120" y="220" font-family="Georgia,serif" font-size="160" font-weight="bold" fill="#c9a84c" opacity="0.15">S</text>
  <!-- Title -->
  <text x="100" y="290" font-family="Georgia,serif" font-size="80" font-weight="bold" fill="#ffffff">Sourcebook</text>
  <!-- Tagline -->
  <text x="104" y="355" font-family="monospace" font-size="26" fill="#c9a84c" letter-spacing="4">LEARN · ORGANIZE · COLLABORATE</text>
  <!-- Description -->
  <text x="104" y="420" font-family="monospace" font-size="22" fill="rgba(255,255,255,0.5)">Your personal resource library.</text>
  <text x="104" y="452" font-family="monospace" font-size="22" fill="rgba(255,255,255,0.5)">Save topics, sections, resources — all in one place.</text>
  <!-- URL -->
  <text x="104" y="560" font-family="monospace" font-size="20" fill="rgba(201,168,76,0.6)">sourcebook.uk</text>
</svg>
